name: ABAP_CLOUD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ABAP_CLOUD:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - run: npm ci
    - run: npx abaplint .github/abaplint/abap_cloud.jsonc
