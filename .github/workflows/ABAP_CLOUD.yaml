name: ABAP_CLOUD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ABAP_CLOUD-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ABAP_CLOUD:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: 'npm'
    - run: npm ci
    - run: npx abaplint .github/abaplint/abap_cloud.jsonc
