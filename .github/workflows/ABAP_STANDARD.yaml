name: ABAP_STANDARD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ABAP_STANDARD:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - run: npm ci
    - run: npx abaplint ./abaplint.jsonc
